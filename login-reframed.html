<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Login — Salford & Co. HealthSaaS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<style>
/* ─── Reset ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{font-family:'DM Sans',sans-serif;background:#fdeede;min-height:100%;-webkit-font-smoothing:antialiased}

/* ─── Layout ─── */
.page{
  display:grid;
  grid-template-columns:46fr 54fr;
  min-height:100dvh;
}

/* ════════════════════════════════
   LEFT PANEL
════════════════════════════════ */
.panel{
  position:relative;
  background:linear-gradient(158deg,#ffd09a 0%,#f68540 42%,#e85520 100%);
  border-radius:0 36px 36px 0;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.panelHeader{
  padding:28px 32px;
  position:relative;
  z-index:3;
  flex-shrink:0;
}
.logoWrap{display:flex;align-items:center;gap:10px}
.logoText{
  font-family:'Sora',sans-serif;
  font-size:clamp(12px,1.1vw,15px);
  font-weight:700;
  color:rgba(255,255,255,.96);
  letter-spacing:1.3px;
}

/* Illustration — fills available space */
.illustration{
  flex:1;
  position:relative;
  overflow:hidden;
  min-height:0;
}
.illustSvg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

/* Footer copy */
.panelFooter{
  position:relative;
  z-index:3;
  padding:clamp(20px,3vw,36px) clamp(24px,3.5vw,38px) clamp(24px,3.5vw,40px);
  background:linear-gradient(to top,rgba(175,38,0,.75) 0%,transparent 100%);
  flex-shrink:0;
}
.panelEyebrow{
  font-size:clamp(11px,1vw,13px);
  color:rgba(255,255,255,.78);
  margin-bottom:6px;
}
.panelHeadline{
  font-family:'Sora',sans-serif;
  font-size:clamp(20px,2.8vw,36px);
  font-weight:800;
  color:#fff;
  line-height:1.2;
  letter-spacing:-.5px;
  display:flex;
  flex-direction:column;
  gap:6px;
}
.panelHeadlineSub{display:flex;align-items:center;gap:12px;flex-wrap:nowrap}
.arrowBadge{
  width:clamp(34px,3.2vw,46px);
  height:clamp(34px,3.2vw,46px);
  border-radius:50%;
  background:rgba(255,255,255,.22);
  border:1.5px solid rgba(255,255,255,.48);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}

/* ════════════════════════════════
   RIGHT FORM SIDE
════════════════════════════════ */
.formSide{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:clamp(32px,5vw,64px) clamp(24px,5vw,64px);
}

.formCard{
  width:100%;
  max-width:420px;
  animation:fadeUp .5s cubic-bezier(.16,1,.3,1) both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.formTitle{
  font-family:'Sora',sans-serif;
  font-size:clamp(28px,3.5vw,42px);
  font-weight:800;
  color:#e85520;
  letter-spacing:-1px;
  margin-bottom:10px;
  line-height:1.08;
}
.formSub{
  font-size:clamp(13px,1.1vw,14px);
  color:#8a6650;
  line-height:1.68;
  margin-bottom:clamp(28px,3.5vw,40px);
}

/* Error banner */
.errorBanner{
  display:none;
  align-items:center;
  gap:10px;
  background:#fde8e8;
  border:1px solid #f5bcbc;
  border-radius:10px;
  padding:12px 14px;
  font-size:13px;
  color:#c0392b;
  margin-bottom:18px;
}
.errorBanner.visible{display:flex}

/* ── Google button ── */
.googleAuthBtn{
  width:100%;
  padding:clamp(13px,1.4vw,16px) 20px;
  border-radius:14px;
  background:#fff;
  border:2px solid #e8c8a8;
  color:#1f2937;
  font-size:clamp(14px,1.3vw,16px);
  font-weight:700;
  font-family:'Sora',sans-serif;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  box-shadow:0 4px 16px rgba(0,0,0,.09);
  transition:border-color .2s,box-shadow .2s,transform .15s,background .2s;
  position:relative;
  overflow:hidden;
  min-height:54px;
}
.googleAuthBtn::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,rgba(232,85,32,.06),transparent);
  opacity:0;
  transition:opacity .2s;
}
.googleAuthBtn:hover:not(:disabled){
  border-color:#e85520;
  box-shadow:0 8px 24px rgba(232,85,32,.28);
  transform:translateY(-2px);
}
.googleAuthBtn:hover:not(:disabled)::after{opacity:1}
.googleAuthBtn:active:not(:disabled){transform:translateY(0)}
.googleAuthBtn:disabled{
  opacity:.55;cursor:default;
  box-shadow:none;background:#f3f4f6;
}

.googleIcon{width:22px;height:22px;flex-shrink:0}
.btnLabel{flex:1;text-align:center;transition:opacity .2s}

/* Spinner inside button */
.spinner{
  width:18px;height:18px;
  border:2.5px solid rgba(60,30,10,.15);
  border-top-color:#e85520;
  border-radius:50%;
  animation:spin .7s linear infinite;
  flex-shrink:0;
  display:none;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Secured note */
.securedTag{
  display:flex;align-items:center;justify-content:center;
  gap:5px;margin-top:14px;
  font-size:12px;color:#a08870;font-weight:500;
}

/* ════════════════════════════════
   TABLET  768–860px
════════════════════════════════ */
@media(max-width:860px){
  .page{
    grid-template-columns:1fr;
    grid-template-rows:auto 1fr;
  }

  /* Compact top banner */
  .panel{
    border-radius:0 0 32px 32px;
    min-height:0;
    max-height:280px;
    flex-direction:row;
    align-items:stretch;
  }

  .panelHeader{
    padding:20px 22px;
    display:flex;
    align-items:flex-start;
    min-width:0;
    flex-shrink:0;
  }

  /* Hide illustration on tablet — save space */
  .illustration{display:none}

  .panelFooter{
    flex:1;
    position:static;
    background:none;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:24px 28px 24px 8px;
  }
  .panelHeadline{font-size:clamp(22px,4vw,32px)}
  .arrowBadge{width:38px;height:38px}

  .formSide{
    align-items:flex-start;
    padding:36px 32px 48px;
  }
}

/* ════════════════════════════════
   MOBILE  < 520px
════════════════════════════════ */
@media(max-width:520px){
  .panel{
    max-height:160px;
    flex-direction:column;
  }
  .panelHeader{padding:18px 20px 10px}
  .panelFooter{
    padding:0 20px 20px;
    background:none;
    position:static;
    flex:1;
    justify-content:flex-end;
  }
  .panelHeadline{font-size:20px;gap:3px}
  .arrowBadge{width:32px;height:32px}
  .arrowBadge svg{width:14px;height:14px}

  .formSide{padding:28px 20px 48px}
  .formTitle{font-size:28px}
  .formSub{font-size:13px;margin-bottom:28px}
  .googleAuthBtn{min-height:52px;border-radius:12px;font-size:14.5px}
}

/* ════════════════════════════════
   VERY SMALL  < 380px
════════════════════════════════ */
@media(max-width:380px){
  .panel{max-height:140px}
  .panelHeadline{font-size:17px}
  .formTitle{font-size:24px}
  .formSub{font-size:12.5px;line-height:1.6;margin-bottom:24px}
  .formSide{padding:24px 16px 40px}
  .googleAuthBtn{padding:13px 16px;font-size:14px;gap:10px}
}

/* ── Accessibility ── */
@media(prefers-contrast:high){
  .googleAuthBtn{border-width:3px;border-color:#e85520}
}
@media(prefers-reduced-motion:reduce){
  *{animation-duration:.01ms !important;transition-duration:.01ms !important}
}
@media(prefers-color-scheme:dark){
  body{background:#1c0f06}
  .formSide{background:#1c0f06}
  .formTitle{color:#f97848}
  .formSub{color:#b89888}
  .googleAuthBtn{background:#2a1608;border-color:#5a3020;color:#f1e4d8}
  .googleAuthBtn:hover:not(:disabled){border-color:#f97848;background:#341c0a}
  .securedTag{color:#7a5848}
}
</style>
</head>

  <div class="formSide" role="main">

      <h1 class="formTitle">Welcome Back!</h1>

      <!-- Error banner -->
      <div class="errorBanner" id="errorBanner" role="alert" aria-live="polite">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true" style="flex-shrink:0">

        <span id="errorMsg"></span>
      </div>

      <!-- Google button -->

<script>
  // ── Firebase config ──────────────────────────────────────
  const firebaseConfig = {
    apiKey:            "YOUR_API_KEY",
    authDomain:        "YOUR_PROJECT.firebaseapp.com",
    projectId:         "YOUR_PROJECT_ID",
    storageBucket:     "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId:             "YOUR_APP_ID"
  };

  firebase.initializeApp(firebaseConfig);
  const auth           = firebase.auth();
  const googleProvider = new firebase.auth.GoogleAuthProvider();
  googleProvider.addScope('profile');
  googleProvider.addScope('email');

  // ── UI refs ──────────────────────────────────────────────
  const btn         = document.getElementById('googleAuthBtn');
  const btnLabel    = document.getElementById('btnLabel');
  const spinner     = document.getElementById('spinner');
  const errorBanner = document.getElementById('errorBanner');
  const errorMsg    = document.getElementById('errorMsg');

  function setLoading(on) {
    btn.disabled      = on;
    spinner.style.display = on ? 'block' : 'none';
    btnLabel.textContent  = on ? 'Signing you in…' : 'Continue with Google';
    btnLabel.style.opacity = on ? '0.7' : '1';
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorBanner.classList.add('visible');
  }

  function hideError() {
    errorBanner.classList.remove('visible');
  }

  // ── Google sign-in ───────────────────────────────────────
  async function handleGoogleAuth() {
    hideError();
    setLoading(true);
    try {
      const result = await auth.signInWithPopup(googleProvider);
      const user   = result.user;
      console.log('✅ Signed in:', user.displayName, user.email);
      // ↓ Replace with your post-login redirect
      // window.location.href = '/dashboard';
      btnLabel.textContent = `Welcome, ${user.displayName?.split(' ')[0]}!`;
    } catch (err) {
      console.error('❌ Sign-in error:', err);
      const friendly =
        err.code === 'auth/popup-closed-by-user'    ? 'Sign-in window was closed. Please try again.' :
        err.code === 'auth/popup-blocked'           ? 'Popup blocked — please allow popups for this site.' :
        err.code === 'auth/cancelled-popup-request' ? 'Another sign-in is already in progress.' :
        err.code === 'auth/network-request-failed'  ? 'Network error. Check your connection and retry.' :
        'Sign-in failed. Please try again.';
      showError(friendly);
      setLoading(false);
    }
  }

  // ── Auth state ───────────────────────────────────────────
  auth.onAuthStateChanged(user => {
    if (user) {
      console.log('👤 Already signed in:', user.displayName);
      // window.location.href = '/dashboard';
    }
