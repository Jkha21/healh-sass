<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HealthSync SaaS - Login</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #f97316, #fbbf24); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .container { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-radius: 1.5rem; box-shadow: 0 25px 50px rgba(0,0,0,0.25); max-width: 60rem; width: 100%; overflow: hidden; display: grid; grid-template-columns: 1fr; gap: 0; }
    @media (min-width: 768px) { .container { grid-template-columns: 1fr 1fr; } }
    .visual-panel { position: relative; min-height: 24rem; background: linear-gradient(135deg, #f97316, #fb923c); padding: 3rem 2rem; color: white; display: flex; flex-direction: column; justify-content: center; }
    @media (min-width: 768px) { .visual-panel { min-height: auto; } }
    .visual-panel::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><radialGradient id="g" cx="50%" cy="50%"><stop offset="0%" stop-color="%23ff0000" stop-opacity="0.1"/><stop offset="100%" stop-color="%23ff8c00" stop-opacity="0"/></radialGradient></defs><rect width="100" height="100" fill="url(%23g)"/></svg>') no-repeat center/cover; opacity: 0.3; } /* Placeholder gradient bg; replace with image */
    .visual-panel > * { position: relative; z-index: 1; }
    .logo { font-size: 2rem; font-weight: bold; margin-bottom: 0.5rem; }
    .tagline { font-size: 1.1rem; line-height: 1.4; }
    .form-panel { padding: 3rem 3rem 3rem 3rem; display: flex; flex-direction: column; justify-content: center; }
    @media (max-width: 767px) { .form-panel { padding: 2rem; } }
    h2 { font-size: 2.5rem; font-weight: bold; color: #1f2937; margin-bottom: 0.5rem; }
    p { color: #6b7280; margin-bottom: 2rem; }
    .google-btn { width: 100%; border: 2px solid #e5e7eb; background: white; border-radius: 1rem; padding: 1rem; display: flex; align-items: center; justify-content: center; gap: 0.75rem; font-weight: 500; cursor: pointer; transition: all 0.2s; margin-bottom: 1.5rem; }
    .google-btn:hover { border-color: #f97316; box-shadow: 0 10px 20px rgba(249,115,22,0.2); }
    .google-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .google-icon { width: 20px; height: 20px; background: #4285f4; border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 14px; color: white; }
    .divider { position: relative; text-align: center; margin: 1.5rem 0; color: #9ca3af; font-size: 0.875rem; }
    .divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: #d1d5db; }
    .divider span { background: white; padding: 0 1rem; }
    input { width: 100%; padding: 1rem; border: 1px solid #d1d5db; border-radius: 1rem; font-size: 1rem; margin-bottom: 1rem; transition: border-color 0.2s; }
    input:focus { outline: none; border-color: #f97316; box-shadow: 0 0 0 3px rgba(249,115,22,0.1); }
    .checkbox-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .checkbox { display: flex; align-items: center; gap: 0.5rem; }
    .forgot { color: #f97316; text-decoration: none; font-size: 0.875rem; }
    .forgot:hover { text-decoration: underline; }
    .submit-btn { width: 100%; background: #f97316; color: white; border: none; padding: 1.25rem; border-radius: 1rem; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .submit-btn:hover:not(:disabled) { background: #ea580c; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .loading { opacity: 0.7; }
    @media (max-width: 767px) { body { padding: 0.5rem; } h2 { font-size: 2rem; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="visual-panel">
      <div class="logo">🩺 HealthSync SaaS</div>
      <div class="tagline">Your Digital Health Record<br>Smart Health for Smarter Care</div>
    </div>
    <div class="form-panel">
      <h2>Welcome back!</h2>
      <p>Log in to access your dashboard securely.</p>
      
      <button id="googleSignIn" class="google-btn">
        <div class="google-icon">G</div>
        Continue with Google
      </button>
      
      <div class="divider">
        <span>or with email</span>
      </div>
      
      <form id="emailForm">
        <input type="email" id="email" placeholder="Email address" required>
        <input type="password" id="password" placeholder="Password" required>
        <div class="checkbox-row">
          <label class="checkbox">
            <input type="checkbox" id="remember">
            Remember me
          </label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">Log in</button>
      </form>
    </div>
  </div>

  <script type="module">
    // Replace with your Firebase config
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      // ... other config
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    const googleSignInBtn = document.getElementById('googleSignIn');
    const emailForm = document.getElementById('emailForm');
    const submitBtn = document.getElementById('submitBtn');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    let loading = false;

    // Google Sign-In
    googleSignInBtn.addEventListener('click', async () => {
      if (loading) return;
      loading = true;
      googleSignInBtn.disabled = true;
      googleSignInBtn.textContent = 'Signing in...';
      googleSignInBtn.classList.add('loading');

      try {
        const provider = new firebase.auth.GoogleAuthProvider();
        const result = await auth.signInWithPopup(provider);
        console.log('Signed in:', result.user);
        // Redirect: window.location.href = '/dashboard.html';
        alert('Signed in successfully! Redirecting...');
      } catch (error) {
        console.error('Google sign-in error:', error);
        alert('Sign-in failed: ' + error.message);
      } finally {
        loading = false;
        googleSignInBtn.disabled = false;
        googleSignInBtn.innerHTML = '<div class="google-icon">G</div>Continue with Google';
        googleSignInBtn.classList.remove('loading');
      }
    });

    // Email Sign-In
    emailForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (loading) return;
      const email = emailInput.value;
      const password = passwordInput.value;
      if (!email || !password) return;

      loading = true;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in...';
      submitBtn.classList.add('loading');

      try {
        const result = await auth.signInWithEmailAndPassword(email, password);
        console.log('Email signed in:', result.user);
        alert('Signed in successfully! Redirecting...');
      } catch (error) {
        console.error('Email sign-in error:', error);
        alert('Invalid credentials: ' + error.message);
      } finally {
        loading = false;
        submitBtn.disabled = false;
        submitBtn.textContent = 'Log in';
        submitBtn.classList.remove('loading');
      }
    });

    // Auth state listener (optional)
    auth.onAuthStateChanged((user) => {
      if (user) {
        console.log('User is signed in:', user);
        // Auto-redirect if needed
      } else {
        console.log('User is signed out');
      }
    });
  </script>
</body>
</html>
